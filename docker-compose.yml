name: super-bank

x-container-logging: &container-logging
  driver: local
  options:
    max-size: "10m"
    max-file: "5"

services:
  neo4j:
    image: neo4j:2026.04.0-community
    container_name: super_bank_neo4j
    restart: unless-stopped
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      # Only NEO4J_AUTH belongs in the Neo4j server container.
      # Do not add NEO4J_PASSWORD here; Neo4j parses NEO4J_* as server settings.
      NEO4J_AUTH: "neo4j/${NEO4J_PASSWORD:-SuperBank_ChangeMe_2026}"
    volumes:
      - neo4j_data:/data
      - ./logs/neo4j:/logs
      - ./data/bank_operating_model_v2/import:/var/lib/neo4j/import
    logging: *container-logging
    healthcheck:
      test: ["CMD-SHELL", "cypher-shell -u neo4j -p '${NEO4J_PASSWORD:-SuperBank_ChangeMe_2026}' 'RETURN 1;' >/dev/null 2>&1"]
      interval: 10s
      timeout: 10s
      retries: 18
      start_period: 20s

  neo4j-import:
    image: neo4j:2026.04.0-community
    container_name: super_bank_neo4j_import
    restart: "no"
    depends_on:
      neo4j:
        condition: service_healthy
    volumes:
      - ./data/bank_operating_model_v2/cypher:/cypher:ro
    entrypoint: ["cypher-shell"]
    command:
      - -a
      - neo4j://neo4j:7687
      - -u
      - neo4j
      - -p
      - "${NEO4J_PASSWORD:-SuperBank_ChangeMe_2026}"
      - -f
      - /cypher/import.cypher
    logging: *container-logging

  ollama:
    image: ollama/ollama:latest
    container_name: super_bank_ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    environment:
      OLLAMA_KEEP_ALIVE: "${OLLAMA_KEEP_ALIVE:--1}"
    volumes:
      - ollama_data:/root/.ollama
    logging: *container-logging
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 10s
      retries: 18
      start_period: 10s

  ollama-init:
    image: ollama/ollama:latest
    container_name: super_bank_ollama_init
    restart: "no"
    depends_on:
      ollama:
        condition: service_healthy
    environment:
      OLLAMA_HOST: http://ollama:11434
      OLLAMA_MODEL: "${OLLAMA_MODEL:-llama3.2:3b}"
      OLLAMA_KEEP_ALIVE: "${OLLAMA_KEEP_ALIVE:--1}"
    entrypoint: ["/bin/sh", "-c"]
    command: ["ollama pull \"$${OLLAMA_MODEL}\" && ollama run \"$${OLLAMA_MODEL}\" \"\""]
    volumes:
      - ollama_data:/root/.ollama
    logging: *container-logging

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: super_bank_backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      NEO4J_URI: neo4j://neo4j:7687
      NEO4J_USER: neo4j
      # Valid here: this is a backend application setting, not a Neo4j server setting.
      NEO4J_PASSWORD: "${NEO4J_PASSWORD:-SuperBank_ChangeMe_2026}"
      LLM_ENABLED: "${LLM_ENABLED:-true}"
      LLM_URL: http://ollama:11434/api/generate
      NO_PROXY: "ollama,neo4j,localhost,127.0.0.1"
      no_proxy: "ollama,neo4j,localhost,127.0.0.1"
      LLM_MODEL: "${OLLAMA_MODEL:-llama3.2:3b}"
      OLLAMA_KEEP_ALIVE: "${OLLAMA_KEEP_ALIVE:--1}"
      LOG_LEVEL: "${LOG_LEVEL:-INFO}"
      LOG_TO_FILE: "${LOG_TO_FILE:-true}"
      LOG_DIR: /app/logs
      INTENT_DETECTION_ENABLED: "${INTENT_DETECTION_ENABLED:-true}"
      GLOBAL_SEARCH_ENABLED: "${GLOBAL_SEARCH_ENABLED:-true}"
      GENERATED_CYPHER_ENABLED: "${GENERATED_CYPHER_ENABLED:-true}"
      INTENT_CONFIDENCE_THRESHOLD: "${INTENT_CONFIDENCE_THRESHOLD:-0.60}"
      ENTITY_MATCH_THRESHOLD: "${ENTITY_MATCH_THRESHOLD:-0.70}"
      GENERATED_QUERY_TIMEOUT_SECONDS: "${GENERATED_QUERY_TIMEOUT_SECONDS:-6}"
      GENERATED_QUERY_LIMIT: "${GENERATED_QUERY_LIMIT:-100}"
      EXPOSE_GENERATED_CYPHER: "${EXPOSE_GENERATED_CYPHER:-true}"
    volumes:
      - ./logs/backend:/app/logs
    logging: *container-logging
    depends_on:
      neo4j-import:
        condition: service_completed_successfully
      ollama-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=4)"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 10s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: super_bank_frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      HOST: 0.0.0.0
      PORT: 3000
      NUXT_API_TARGET: http://backend:8000/api
      FRONTEND_LOG_FILE: /app/logs/server.log
    volumes:
      - ./logs/frontend:/app/logs
    logging: *container-logging
    depends_on:
      backend:
        condition: service_healthy

volumes:
  neo4j_data:
  ollama_data:
