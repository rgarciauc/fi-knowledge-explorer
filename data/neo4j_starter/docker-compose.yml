services:
  neo4j:
    image: neo4j:2026.04.0-community
    container_name: super_bank_neo4j
    ports:
      - "7474:7474"   # Neo4j Browser
      - "7687:7687"   # Bolt connection for FastAPI later
    environment:
      NEO4J_AUTH: neo4j/SuperBank_ChangeMe_2026
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
      - ./import:/var/lib/neo4j/import
    restart: unless-stopped

volumes:
  neo4j_data:
  neo4j_logs:
